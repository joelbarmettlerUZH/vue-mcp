name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/${{ github.repository }}/vue-mcp-server
  INGESTION_IMAGE: ghcr.io/${{ github.repository }}/vue-mcp-ingestion

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:latest
            ${{ env.SERVER_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build & push ingestion image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ingestion
          push: true
          tags: |
            ${{ env.INGESTION_IMAGE }}:latest
            ${{ env.INGESTION_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=ingestion
          cache-to: type=gha,mode=max,scope=ingestion
