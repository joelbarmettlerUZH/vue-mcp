name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image names
        id: meta
        run: |
          REPO="${{ github.repository }}"
          REPO_LOWER="${REPO,,}"
          echo "server=${{ env.REGISTRY }}/${REPO_LOWER}/vue-mcp-server" >> "$GITHUB_OUTPUT"
          echo "ingestion=${{ env.REGISTRY }}/${REPO_LOWER}/vue-mcp-ingestion" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server
          push: true
          tags: |
            ${{ steps.meta.outputs.server }}:latest
            ${{ steps.meta.outputs.server }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build & push ingestion image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ingestion
          push: true
          tags: |
            ${{ steps.meta.outputs.ingestion }}:latest
            ${{ steps.meta.outputs.ingestion }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=ingestion
          cache-to: type=gha,mode=max,scope=ingestion
