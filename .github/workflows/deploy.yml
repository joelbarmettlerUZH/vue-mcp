name: Build, Backup & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image names
        id: meta
        run: |
          REPO="${{ github.repository }}"
          REPO_LOWER="${REPO,,}"
          echo "server=${{ env.REGISTRY }}/${REPO_LOWER}/vue-mcp-server" >> "$GITHUB_OUTPUT"
          echo "ingestion=${{ env.REGISTRY }}/${REPO_LOWER}/vue-mcp-ingestion" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server
          push: true
          tags: |
            ${{ steps.meta.outputs.server }}:latest
            ${{ steps.meta.outputs.server }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build & push ingestion image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ingestion
          push: true
          tags: |
            ${{ steps.meta.outputs.ingestion }}:latest
            ${{ steps.meta.outputs.ingestion }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=ingestion
          cache-to: type=gha,mode=max,scope=ingestion

  backup:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run pre-deploy backup on server
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "rm -rf /tmp/pre-deploy-backup && bash ${{ vars.DEPLOY_DIR || '/opt/vue-mcp' }}/backup.sh /tmp/pre-deploy-backup docker-compose.prod.yml .env.production"

      - name: Download PG backup from server
        run: |
          mkdir -p backup
          scp "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/pre-deploy-backup/pg-*.sql.gz" backup/

      - name: Encrypt backup
        run: |
          PG_DUMP=$(ls -t backup/pg-*.sql.gz | head -1)
          echo "${{ secrets.BACKUP_ENCRYPTION_KEY }}" | gpg --batch --yes --passphrase-fd 0 \
            --symmetric --cipher-algo AES256 \
            -o backup/pg-backup.sql.gz.gpg "$PG_DUMP"
          rm backup/pg-*.sql.gz

      - name: Upload encrypted backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: pg-backup-${{ github.run_id }}
          path: backup/pg-backup.sql.gz.gpg
          retention-days: 90

  deploy:
    needs: backup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync configuration files
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR || '/opt/vue-mcp' }}
        run: |
          scp -q \
            docker-compose.prod.yml \
            scripts/backup.sh \
            scripts/restore.sh \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${DEPLOY_DIR}/"

      - name: Write .env.production from secrets
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR || '/opt/vue-mcp' }}
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "cat > ${DEPLOY_DIR}/.env.production << 'ENVEOF'
          # External APIs
          JINA_API_KEY=${{ secrets.JINA_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

          # PostgreSQL
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          DATABASE_URL=postgresql+psycopg://vue_mcp:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/vue_mcp

          # Qdrant (internal network, no auth)
          QDRANT_URL=http://qdrant:6333

          # Server
          SERVER_TRANSPORT=streamable-http
          SERVER_HOST=0.0.0.0
          SERVER_PORT=8000
          MASK_ERROR_DETAILS=true

          # Ingestion schedule
          INGESTION_INTERVAL_HOURS=24

          # Traefik TLS
          DOMAIN=${{ vars.DOMAIN || 'mcp.vue-mcp.org' }}
          ACME_EMAIL=${{ secrets.ACME_EMAIL }}
          TLS_CERTRESOLVER=letsencrypt
          ENVEOF"

      - name: Pull and restart services
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR || '/opt/vue-mcp' }}
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            set -euo pipefail
            cd ${DEPLOY_DIR}
            docker compose --env-file .env.production -f docker-compose.prod.yml pull
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            echo 'Deploy complete. Services:'
            docker compose --env-file .env.production -f docker-compose.prod.yml ps --format 'table {{.Name}}\t{{.Status}}'
          "
