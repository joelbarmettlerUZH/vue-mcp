# Full local stack with mkcert TLS via Traefik.
# Prerequisites:
#   mkcert -install
#   mkcert -cert-file certs/local.pem -key-file certs/local-key.pem "$(hostname -I | awk '{print $1}').nip.io"
# Usage: DOMAIN=$(hostname -I | awk '{print $1}').nip.io docker compose -f docker-compose.local.yml up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  mcp-server:
    image: ghcr.io/${GITHUB_REPOSITORY:-joelbarmettleruzh/vue-mcp}/vue-mcp-server:${IMAGE_TAG:-latest}
    build:
      context: .
      target: server
    environment:
      SERVER_TRANSPORT: streamable-http
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8000"
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: postgresql+psycopg://vue_mcp:${POSTGRES_PASSWORD:-vue_mcp}@postgres:5432/vue_mcp
      JINA_API_KEY: ${JINA_API_KEY:-}
      MASK_ERROR_DETAILS: ${MASK_ERROR_DETAILS:-false}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mcp.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.mcp.entrypoints=websecure"
      - "traefik.http.routers.mcp.tls=true"
      - "traefik.http.services.mcp.loadbalancer.server.port=8000"
    mem_limit: 2g
    cpus: 1.0
    logging: *default-logging
    restart: unless-stopped

  ingestion:
    image: ghcr.io/${GITHUB_REPOSITORY:-joelbarmettleruzh/vue-mcp}/vue-mcp-ingestion:${IMAGE_TAG:-latest}
    build:
      context: .
      target: ingestion
    command: vue-docs-ingest watch --verbose --interval-hours ${INGESTION_INTERVAL_HOURS:-24}
    environment:
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: postgresql+psycopg://vue_mcp:${POSTGRES_PASSWORD:-vue_mcp}@postgres:5432/vue_mcp
      VUE_DOCS_PATH: /app/data/vue-docs/src
      DATA_PATH: /app/data
      JINA_API_KEY: ${JINA_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - vue-docs-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    mem_limit: 4g
    cpus: 2.0
    logging: *default-logging
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: vue_mcp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vue_mcp}
      POSTGRES_DB: vue_mcp
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vue_mcp"]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 2g
    cpus: 1.0
    logging: *default-logging
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.17.0
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 4g
    cpus: 2.0
    logging: *default-logging
    restart: unless-stopped

  traefik:
    image: traefik:v3.6
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/certs:ro
      - ./traefik-dynamic.yml:/etc/traefik/dynamic.yml:ro
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging
    restart: unless-stopped

volumes:
  pg-data:
  qdrant-data:
  vue-docs-data:
