[project]
name = "vue-docs-ingestion"
version = "0.1.0"
description = "CLI tool — offline batch indexing pipeline for Vue docs"
requires-python = ">=3.13"
dependencies = [
    "vue-docs-core",
    "typer>=0.24",
    "rich>=14.3",
]

[tool.uv.sources]
vue-docs-core = { workspace = true }

[project.scripts]
vue-docs-ingest = "vue_docs_ingestion.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vue_docs_ingestion"]
