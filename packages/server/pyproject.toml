[project]
name = "vue-docs-server"
version = "0.1.0"
description = "MCP server — online query handling for Vue docs"
requires-python = ">=3.13"
dependencies = [
    "vue-docs-core",
    "fastmcp>=3.1",
]

[tool.uv.sources]
vue-docs-core = { workspace = true }

[project.scripts]
vue-docs-server = "vue_docs_server.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vue_docs_server"]
