[project]
name = "vue-docs-core"
version = "0.1.0"
description = "Shared library — models, clients, utilities for Vue docs MCP"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.12",
    "pydantic-settings>=2.13",
    "qdrant-client>=1.17",
    "httpx>=0.28",
    "markdown-it-py>=4.0",
    "rapidfuzz>=3.14",
    "bm25s>=0.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vue_docs_core"]
